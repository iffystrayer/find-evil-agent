site_name: Find Evil Agent
site_description: Autonomous AI Incident Response Agent for SANS SIFT Workstation
site_author: Find Evil Agent Team
site_url: https://iffystrayer.github.io/find-evil-agent

repo_name: iffystrayer/find-evil-agent
repo_url: https://github.com/iffystrayer/find-evil-agent
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    logo: material/magnify

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iffystrayer/find-evil-agent
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/find-evil-agent
  version:
    provider: mike

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - autorefs
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Quick Start: quick-start.md
    - Configuration: configuration.md
  - User Guide:
    - Basic Usage: usage.md
    - Understanding Results: results.md
    - Troubleshooting: troubleshooting.md
  - Architecture:
    - Overview: architecture.md
    - Components: components.md
    - Workflows: workflows.md
  - API Reference:
    - CLI Commands: api/cli.md
    - REST API: api/rest.md
    - Python API: api/python.md
    - MCP Server: api/mcp.md
  - Deployment:
    - SIFT VM Setup: deployment/sift-setup.md
    - LLM Configuration: deployment/llm-config.md
    - Security: deployment/security.md
  - Development:
    - Contributing: contributing.md
    - Testing: testing.md
    - Release Process: release.md
