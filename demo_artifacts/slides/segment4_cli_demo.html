<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Evil Agent - CLI Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            background: #1e1e1e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #d4d4d4;
            overflow: hidden;
        }

        .header {
            background: #2d2d30;
            padding: 30px;
            border-bottom: 3px solid #4fd1c5;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #4fd1c5;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            color: #d4d4d4;
            opacity: 0.8;
        }

        .terminal {
            flex: 1;
            background: #1e1e1e;
            padding: 40px;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .prompt {
            color: #4ec9b0;
            font-weight: bold;
        }

        .command {
            color: #9cdcfe;
        }

        .output {
            color: #d4d4d4;
            margin: 10px 0;
            padding-left: 10px;
        }

        .success {
            color: #4ec9b0;
        }

        .info {
            color: #569cd6;
        }

        .warning {
            color: #dcdcaa;
        }

        .highlight {
            color: #ffd700;
            font-weight: bold;
        }

        .line {
            opacity: 0;
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #4fd1c5;
            animation: blink 1s infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .section {
            margin: 30px 0;
            padding: 20px 0;
            border-top: 1px solid #3e3e42;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⌨️ CLI Demo</h1>
        <p>Power-user interface for automation and scripting</p>
    </div>

    <div class="terminal" id="terminal">
        <!-- Content will be dynamically added -->
    </div>

    <script>
        const lines = [
            { text: '$ uv run find-evil analyze \\', class: 'prompt command', delay: 0 },
            { text: '    "Suspicious network traffic to unknown IP" \\', class: 'command', delay: 500 },
            { text: '    "Identify potential C2 communication" \\', class: 'command', delay: 1000 },
            { text: '    -o /tmp/analysis.md -v', class: 'command', delay: 1500 },
            { text: '', class: '', delay: 2500 },
            { text: '🔍 Starting analysis...', class: 'output info', delay: 3000 },
            { text: '', class: '', delay: 3500 },
            { text: '📊 Tool Selection (Semantic Search + LLM Ranking)', class: 'output highlight', delay: 4000 },
            { text: '   ├─ tcpdump (confidence: 92%) ✓', class: 'output success', delay: 4500 },
            { text: '   ├─ wireshark (confidence: 88%)', class: 'output', delay: 5000 },
            { text: '   └─ netstat (confidence: 75%)', class: 'output', delay: 5500 },
            { text: '', class: '', delay: 6000 },
            { text: '⚡ Executing on SIFT VM (192.168.12.101)...', class: 'output info', delay: 6500 },
            { text: '   ssh analyst@sift-workstation', class: 'output', delay: 7000 },
            { text: '   > sudo tcpdump -r /evidence/network.pcap', class: 'output', delay: 7500 },
            { text: '', class: '', delay: 8000 },
            { text: '✅ Execution Complete (2.3s)', class: 'output success', delay: 8500 },
            { text: '', class: '', delay: 9000 },
            { text: '🔬 Finding Extraction', class: 'output highlight', delay: 9500 },
            { text: '   ├─ Suspicious DNS queries to unknown-domain.com', class: 'output warning', delay: 10000 },
            { text: '   ├─ Encrypted traffic to 203.0.113.42:443', class: 'output warning', delay: 10500 },
            { text: '   └─ Beaconing pattern every 60 seconds', class: 'output warning', delay: 11000 },
            { text: '', class: '', delay: 11500 },
            { text: '🎯 IOC Extraction', class: 'output highlight', delay: 12000 },
            { text: '   ├─ IP: 203.0.113.42 (severity: HIGH)', class: 'output warning', delay: 12500 },
            { text: '   ├─ Domain: unknown-domain.com (severity: HIGH)', class: 'output warning', delay: 13000 },
            { text: '   └─ Protocol: HTTPS (port 443)', class: 'output', delay: 13500 },
            { text: '', class: '', delay: 14000 },
            { text: '📝 Report generated: /tmp/analysis.md', class: 'output success', delay: 14500 },
            { text: '', class: '', delay: 15000 },
            { text: '$ cat /tmp/analysis.md | head -20', class: 'prompt command', delay: 15500 },
            { text: '', class: '', delay: 16000 },
            { text: '# Forensic Analysis Report', class: 'output highlight', delay: 16500 },
            { text: '', class: '', delay: 17000 },
            { text: '## Executive Summary', class: 'output', delay: 17200 },
            { text: 'Analysis identified potential Command & Control (C2)', class: 'output', delay: 17400 },
            { text: 'communication with external IP 203.0.113.42.', class: 'output', delay: 17600 },
            { text: '', class: '', delay: 18000 },
            { text: '## Tools Used', class: 'output', delay: 18200 },
            { text: '- **tcpdump**: Network packet capture analysis (confidence: 92%)', class: 'output', delay: 18400 },
            { text: '', class: '', delay: 18800 },
            { text: '## Findings', class: 'output', delay: 19000 },
            { text: '1. Suspicious DNS queries (severity: HIGH)', class: 'output warning', delay: 19200 },
            { text: '2. Encrypted beaconing traffic (severity: HIGH)', class: 'output warning', delay: 19400 },
            { text: '3. Regular 60-second interval pattern (severity: MEDIUM)', class: 'output warning', delay: 19600 },
            { text: '', class: '', delay: 20000 },
            { text: '## IOCs', class: 'output', delay: 20200 },
            { text: '- IP: 203.0.113.42', class: 'output warning', delay: 20400 },
            { text: '- Domain: unknown-domain.com', class: 'output warning', delay: 20600 },
            { text: '', class: '', delay: 21000 },
            { text: '## Recommended Actions', class: 'output', delay: 21200 },
            { text: '1. Block IP 203.0.113.42 at firewall', class: 'output', delay: 21400 },
            { text: '2. Investigate all endpoints communicating with this IP', class: 'output', delay: 21600 },
            { text: '3. Review DNS logs for similar patterns', class: 'output', delay: 21800 },
            { text: '', class: '', delay: 22200 },
            { text: '✅ Professional markdown output ready for IR documentation', class: 'output success', delay: 22700 },
            { text: '', class: '', delay: 23200 },
            { text: '$ ', class: 'prompt', delay: 23700, showCursor: true },
        ];

        const terminal = document.getElementById('terminal');
        let currentLine = 0;

        function addLine() {
            if (currentLine >= lines.length) return;

            const line = lines[currentLine];
            const div = document.createElement('div');
            div.className = `line ${line.class}`;
            div.textContent = line.text;

            if (line.showCursor) {
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                div.appendChild(cursor);
            }

            terminal.appendChild(div);

            // Scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;

            currentLine++;
            if (currentLine < lines.length) {
                setTimeout(addLine, lines[currentLine].delay - lines[currentLine - 1].delay);
            }
        }

        // Start animation
        setTimeout(addLine, 500);

        // Auto-complete signal
        setTimeout(() => {
            console.log('Segment 4 complete');
        }, 60000); // 1 minute
    </script>
</body>
</html>
